<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブランドランク検索アプリ</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>Brand Rank Search</h1>
            <p>ブランド名やふりがなでランクを検索</p>
        </header>

        <main class="container">
            <div class="search-container">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="ブランド名を入力... (例: エルメス, えるめす)" autocomplete="off">
            </div>

            <div id="resultsContainer" class="results-grid">
                <!-- Results will be injected here -->
            </div>
            
            <div id="noResults" class="no-results hidden">
                <i class="ph ph-warning-circle"></i>
                <p>該当するブランドが見つかりませんでした。</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
